name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build — ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: wordlr
            archive: wordlr-linux-x86_64.tar.gz

          - os: macos-latest
            target: aarch64-apple-darwin
            binary: wordlr
            archive: wordlr-macos-arm64.tar.gz

          - os: macos-latest
            target: x86_64-apple-darwin
            binary: wordlr
            archive: wordlr-macos-x86_64.tar.gz

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: wordlr.exe
            archive: wordlr-windows-x86_64.zip

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          tar -czf ${{ matrix.archive }} \
            -C target/${{ matrix.target }}/release ${{ matrix.binary }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          Compress-Archive `
            -Path target/${{ matrix.target }}/release/${{ matrix.binary }} `
            -DestinationPath ${{ matrix.archive }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            wordlr-linux-x86_64.tar.gz
            wordlr-macos-arm64.tar.gz
            wordlr-macos-x86_64.tar.gz
            wordlr-windows-x86_64.zip
          generate_release_notes: true
